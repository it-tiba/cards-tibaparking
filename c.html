<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Contact Card</title></head>
<body>
<script>
const p = new URLSearchParams(window.location.search);
const n = p.get('n') || '';
const e = p.get('e') || '';
const ph = p.get('p') || '';
const c = p.get('c') || '';
const t = p.get('t') || '';
const parts = n.split(' ');
const first = parts[0] || '';
const last = parts.slice(1).join(' ') || '';

const vcf = [
  'BEGIN:VCARD',
  'VERSION:3.0',
  `N:${last};${first};;;`,
  `FN:${n}`,
  c ? `ORG:${c}` : '',
  t ? `TITLE:${t}` : '',
  ph ? `TEL;TYPE=CELL:${ph}` : '',
  e ? `EMAIL:${e}` : '',
  'END:VCARD'
].filter(Boolean).join('\r\n');

// Try direct navigation (opens "Add to Contacts" on iOS/Android)
const blob = new Blob([vcf], { type: 'text/x-vcard' });
const url = URL.createObjectURL(blob);
window.location.href = url;

// Fallback after 2 seconds if direct navigation didn't work
setTimeout(function() {
  const a = document.createElement('a');
  a.href = url;
  a.download = `${n.replace(/\s+/g, '_') || 'contact'}.vcf`;
  a.click();
}, 2000);
</script>
<p style="font-family:sans-serif;text-align:center;margin-top:40px;color:#666;">
  Opening contact card&hellip;
</p>
</body>
</html>

<html><head><meta charset="utf-8"><title>Contact Card</title></head>
<body>
<script>
const p = new URLSearchParams(window.location.search);
const n = p.get('n') || '';
const e = p.get('e') || '';
const ph = p.get('p') || '';
const c = p.get('c') || '';
const t = p.get('t') || '';
const parts = n.split(' ');
const first = parts[0] || '';
const last = parts.slice(1).join(' ') || '';

const vcf = [
  'BEGIN:VCARD',

  ph ? `TEL;TYPE=CELL:${ph}` : '',
  e ? `EMAIL:${e}` : '',
  'END:VCARD'
].filter(Boolean).join('\r\n');
